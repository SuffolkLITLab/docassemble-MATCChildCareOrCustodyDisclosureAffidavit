  Your Child Care or Custody Disclosure Affidavit is complete. 
  
  **What to do next:**
  
  1. **Download** or **Email** the packet to yourself using the links below.
  2. **Review** the forms to make sure all information is correct.
  3. **Sign** the document where indicated.
  4. **File** the affidavit at the appropriate Probate and Family Court.

  > Make sure to read the **"Next Steps"** document included in your packet for detailed instructions on how to file and serve the other party.
  
